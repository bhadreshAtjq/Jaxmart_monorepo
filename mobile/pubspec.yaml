name: b2b_platform
description: B2B Marketplace - Products & Services Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  photo_view: ^0.14.0
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  dotted_border: ^2.1.0
  flutter_rating_bar: ^4.0.1
  pinput: ^3.0.1
  intl_phone_field: ^3.2.0
  country_code_picker: ^3.0.0

  # Maps & Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Payments
  razorpay_flutter: ^1.3.6

  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^17.0.0

  # Real-time (Socket.io)
  socket_io_client: ^2.0.3+1

  # Charts
  fl_chart: ^0.66.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  permission_handler: ^11.2.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  image_cropper: ^5.0.1

  # Forms & Validation
  reactive_forms: ^17.0.0

  # Animations
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.1.0
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
